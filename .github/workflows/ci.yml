name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    name: node --test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      # No dependencies to install — the test suite is pure node:test.
      - name: Run tests
        run: npm test
